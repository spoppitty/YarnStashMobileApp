<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Forgot Password - Yarn Stash</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" /><link rel="stylesheet" href="../assets/styles.css" /></head><body class="flex items-center justify-center"><div class="phone-shell"><main class="phone-screen">
<div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div></div>
<section class="app-content no-tab"><div class="scroll">
 <div class="nav-row"><a class="icon-btn" href="login.html"><i class="fa-solid fa-chevron-left"></i></a></div>
 <div class="mt-8 w-20 h-20 rounded-[28px] bg-[#f6d9cd] flex items-center justify-center"><i class="fa-solid fa-lock-open text-[#814734] text-3xl"></i></div>
 <h1 class="nav-title mt-6">Reset password</h1>
 <p class="mt-3 text-base font-semibold text-[#8b7d72] leading-relaxed">Yarn Stash will send a secure reset link to the email on your account.</p>
 <div class="auth-panel space-y-3">
  <div class="auth-field"><label class="field-label" for="reset-email">Email</label><input id="reset-email" class="auth-input" type="email" value="sarah@example.com"></div>
 </div>
 <a class="primary-btn w-full mt-5" href="login.html"><i class="fa-solid fa-paper-plane"></i>Send reset link</a>
 <div class="card p-4 mt-5">
  <div class="flex gap-3"><div class="w-10 h-10 rounded-2xl bg-[#dce7d7] flex items-center justify-center flex-none"><i class="fa-solid fa-envelope text-[#587456]"></i></div><div><h2 class="font-black">Check your inbox</h2><p class="text-sm font-bold text-[#8b7d72] mt-1 leading-relaxed">Reset links expire after 30 minutes for account security.</p></div></div>
 </div>
 <p class="text-center text-sm font-bold text-[#8b7d72] mt-6">Remembered it? <a class="auth-link" href="login.html">Back to login</a></p>
</div></section>
</main></div></body></html>
