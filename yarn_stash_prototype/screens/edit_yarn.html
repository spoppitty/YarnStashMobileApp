<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Edit Yarn - Yarn Stash</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" /><link rel="stylesheet" href="../assets/styles.css" /></head><body class="flex items-center justify-center"><div class="phone-shell"><main class="phone-screen">
<div class="status-bar"><span>9:41</span><div class="status-icons"><i class="fa-solid fa-signal"></i><i class="fa-solid fa-wifi"></i><i class="fa-solid fa-battery-full"></i></div></div>
<section class="app-content no-tab"><div class="scroll">
 <div class="nav-row"><button class="icon-btn"><i class="fa-solid fa-xmark"></i></button></div>
 <h1 class="nav-title mt-4">Edit stash item</h1>
 <div class="mt-5 card p-4 flex items-center gap-4"><img class="w-20 h-20 rounded-[22px] object-cover" src="https://source.unsplash.com/430x430/?blue,wool,yarn" alt="yarn"><div><h2 class="text-xl font-black">Malabrigo Rios</h2><p class="text-sm font-bold text-[#8b7d72]">Malabrigo Yarn</p></div></div>
 <h2 class="text-lg font-black mt-6">Autofilled details</h2>
 <div class="grid grid-cols-2 gap-3 mt-3"><div class="field"><div class="field-label">Weight</div><div class="field-value">Worsted</div></div><div class="field"><div class="field-label">WPI</div><div class="field-value">9</div></div><div class="field"><div class="field-label">Length</div><div class="field-value">210 yd</div></div><div class="field"><div class="field-label">Unit weight</div><div class="field-value">100 g</div></div><div class="field"><div class="field-label">Needle</div><div class="field-value">US 6-8</div></div><div class="field"><div class="field-label">Gauge</div><div class="field-value">18-22 sts</div></div></div>
 <h2 class="text-lg font-black mt-6">Your stash info</h2>
 <div class="mt-3 space-y-3"><div class="field"><div class="field-label">Colorway</div><div class="field-value text-[#8b7d72]">Aguas</div></div><div class="grid grid-cols-2 gap-3"><div class="field"><label class="field-label" for="color-family">Color family</label><select id="color-family" class="auth-input mt-2"><option>Blue</option><option>Green</option><option>Pink</option><option>Purple</option><option>Neutral</option><option>Multicolor</option></select></div><div class="field"><div class="field-label">Dye lot</div><div class="field-value text-[#8b7d72]">A27</div></div></div><div class="grid grid-cols-2 gap-3"><div class="field"><div class="field-label">Balls</div><div class="field-value">4</div></div><div class="field"><div class="field-label">Price</div><div class="field-value text-[#8b7d72]">$14.50</div></div></div><div class="field"><label class="field-label" for="folder">Folder</label><select id="folder" class="auth-input mt-2"><option>Sweaters</option><option>Socks</option><option>Summer tops</option><option>Bin 2</option><option>No folder</option></select></div><div class="field min-h-[92px]"><div class="field-label">Notes</div><div class="field-value text-[#8b7d72] text-base font-semibold">Reserved for the Weekender sweater.</div></div><div class="field"><div class="field-label">Images</div><label class="mt-3 h-24 rounded-[20px] border-2 border-dashed border-[#ece2d8] bg-[#fff7ed] flex flex-col items-center justify-center gap-2 text-[#b66f54] cursor-pointer"><i class="fa-solid fa-camera text-2xl"></i><span class="text-sm font-black">Add images (optional)</span><input class="hidden" type="file" accept="image/*" multiple></label></div></div>
 <button class="primary-btn w-full mt-5"><i class="fa-solid fa-check"></i>Save changes</button>
 <button class="secondary-btn w-full mt-3"><i class="fa-solid fa-box-archive"></i>Move to used up</button>
 <button class="secondary-btn w-full mt-3 text-[#b0453b]"><i class="fa-regular fa-trash-can"></i>Remove from stash</button>
</div></section>
</main></div></body></html>
