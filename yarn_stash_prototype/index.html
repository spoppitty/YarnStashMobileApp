<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yarn Stash Prototype</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/styles.css" />
</head>
<body class="prototype-index">
  <header class="text-center py-10">
    <h1 class="text-4xl font-black tracking-[-0.04em] text-[#2c241e]">Yarn Stash High-Fidelity Prototype</h1>
  </header>
  <section class="index-grid">
    <div class="index-card"><div class="index-label">Log In</div><iframe class="index-frame" src="screens/login.html" title="Log in screen"></iframe></div>
    <div class="index-card"><div class="index-label">Sign Up</div><iframe class="index-frame" src="screens/sign_up.html" title="Sign up screen"></iframe></div>
    <div class="index-card"><div class="index-label">Forgot Password</div><iframe class="index-frame" src="screens/forgot_password.html" title="Forgot password screen"></iframe></div>
    <div class="index-card"><div class="index-label">Collection</div><iframe class="index-frame" src="screens/collection.html" title="Collection screen"></iframe></div>
    <div class="index-card"><div class="index-label">Catalog Search</div><iframe class="index-frame" src="screens/search.html" title="Search screen"></iframe></div>
    <div class="index-card"><div class="index-label">Add Yarn</div><iframe class="index-frame" src="screens/add_yarn.html" title="Add yarn screen"></iframe></div>
    <div class="index-card"><div class="index-label">Yarn Detail</div><iframe class="index-frame" src="screens/yarn_detail.html" title="Yarn detail screen"></iframe></div>
    <div class="index-card"><div class="index-label">Edit Yarn</div><iframe class="index-frame" src="screens/edit_yarn.html" title="Edit yarn screen"></iframe></div>
    <div class="index-card"><div class="index-label">Folders</div><iframe class="index-frame" src="screens/folders.html" title="Folders screen"></iframe></div>
    <div class="index-card"><div class="index-label">Folder Detail</div><iframe class="index-frame" src="screens/folder_detail.html" title="Folder detail screen"></iframe></div>
    <div class="index-card"><div class="index-label">Profile</div><iframe class="index-frame" src="screens/profile.html" title="Profile screen"></iframe></div>
    <div class="index-card"><div class="index-label">Settings</div><iframe class="index-frame" src="screens/settings.html" title="Settings screen"></iframe></div>
  </section>
</body>
</html>
